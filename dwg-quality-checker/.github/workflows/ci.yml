name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    name: Run DWG Quality Checker
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate sample DXF with issues
        run: python samples/generate_sample.py

      - name: Run checker (console output)
        run: python main.py samples/sample_with_issues.dxf

      - name: Run checker (generate all reports)
        run: python main.py samples/sample_with_issues.dxf --output all --output-file samples/report

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-py${{ matrix.python-version }}
          path: |
            samples/report.html
            samples/report.csv
